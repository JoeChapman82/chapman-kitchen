name: Build Indexes

on:
  push:
    paths:
      - 'data/recipes/**'
      - 'data/previous-planners/**'
      - 'data/planners/**'
      - '!data/recipes/index.json'
      - '!data/previous-planners/index.json'
      - '!data/planners/index.json'

jobs:
  build-indexes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build indexes
        run: node scripts/build-indexes.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/recipes/index.json data/previous-planners/index.json data/planners/index.json
          git diff --cached --quiet || git commit -m "Update indexes"
          git push